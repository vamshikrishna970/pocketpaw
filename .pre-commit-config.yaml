repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.2
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest
        name: pytest (unit tests)
        entry: uv run --no-sync pytest --ignore=tests/e2e -x -q
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
